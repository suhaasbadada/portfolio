<div class="modal-header modal-surface">
    <h2 class="modal-title-text">
        <p *ngIf="project.url; else projectInProgress" class="modal-title-accent">
            {{project.name}}
        </p>        
        <ng-template #projectInProgress>{{project.name}} - Project in Progress</ng-template>
    </h2>
    <button class="custom-close-btn" type="button" aria-label="Close project details" (click)="bsModalRef.hide()">&times;</button>
</div>

<div class="modal-body">
    <carousel>
        <div *ngFor="let media of project.pictures">
            <slide>
                <!-- Check if file is video by extension -->
                <div *ngIf="isVideo(media); else imageTemplate">
                    <video controls style="display: block; width: 100%; max-height: 400px;">
                        <source src="{{media}}" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
                <ng-template #imageTemplate>
                    <img src="{{media}}" alt="slide" style="display: block; width: 100%;">
                </ng-template>
            </slide>
        </div>
    </carousel>
    
    <hr class="accent-hr">
    <div class="d-flex flex-wrap">
        <!-- Fixed: loop over project.tags instead of project.pictures -->
        <div *ngFor="let tag of project.tags">
            <div class="tag me-2 mb-1">{{tag}}</div>
        </div>
    </div>
</div>
